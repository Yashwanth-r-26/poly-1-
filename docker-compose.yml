services:
  btc5bot:
    build: .
    image: btc5bot:latest
    container_name: btc5bot
    # restart forever, even across VM reboots — this is what makes it autonomous
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ensure data lands on the mounted volume
      SIM_CSV: /app/data/dryrun_trades.csv
      SIM_STATS: /app/data/dryrun_stats.json
    volumes:
      # persist CSV + stats on the host so container restarts never lose data
      - ./data:/app/data
    # rotate logs so days of heartbeats don't fill the disk
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"